# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/hospital_exchange?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JSP Configuration
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# File Upload (for any resource images if needed)
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# Server Configuration
server.port=8081
server.servlet.context-path=/

# Logging
logging.level.com.hospital.exchange=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG

# Role-Based Access Control (RBAC) defaults
# Enable default security for this demo (Admin, Hospital Admin)
# In production, this would be highly customized
# Security Configurations
spring.security.user.name=admin
spring.security.user.password=admin123
spring.security.user.roles=ADMIN

# External Integrations
# GOOGLE_MAPS_API_KEY: Replace with your actual key for Directions and Live Traffic
google.maps.api.key=YOUR_ACTUAL_GOOGLE_MAPS_API_KEY_HERE
